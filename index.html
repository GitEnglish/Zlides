<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zlides Editor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            display: flex; height: 100vh; background: #1e1e1e; color: #fff; 
        }
        #sidebar { 
            width: 360px; display: flex; flex-direction: column; 
            background: #252526; border-right: 1px solid #333; flex-shrink: 0;
        }
        #sidebar-header { 
            background: #0e639c; padding: 12px; font-weight: bold; 
            text-align: center; font-size: 16px;
            position: relative;
        }
        #version-info {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            opacity: 0.8;
            font-weight: normal;
        }
        #history { 
            flex: 1; overflow-y: auto; padding: 12px; font-size: 13px; 
        }
        .msg { margin-bottom: 8px; padding: 8px 10px; border-radius: 6px; 
            white-space: pre-wrap; word-wrap: break-word; }
        .msg.user { background: #0066cc; text-align: right; }
        .msg.agent { background: #3c3c3c; }
        
        #input-area { 
            padding: 12px; background: #2d2d2d; display: flex; 
            flex-direction: column; gap: 8px; border-top: 1px solid #444;
            max-height: 380px; overflow-y: auto;
        }
        
        .opts-row { display: flex; gap: 6px; flex-wrap: wrap; }
        .opts-row > div { flex: 1; min-width: 80px; }
        .opts-row label { display: block; font-size: 10px; color: #888; margin-bottom: 2px; }
        .opts-row select, .opts-row input[type="number"] {
            width: 100%; padding: 5px; background: #1e1e1e; 
            border: 1px solid #444; color: #fff; border-radius: 4px; font-size: 12px;
        }
        
        .btn-row { display: flex; gap: 6px; }
        .btn-row button { 
            flex: 1; padding: 8px; background: #0e639c; color: white; 
            border: none; cursor: pointer; border-radius: 4px; font-size: 12px;
        }
        .btn-row button:hover { background: #1177bb; }
        .btn-row button.green { background: #28a745; }
        .btn-row button.red { background: #dc3545; }
        
        textarea { 
            width: 100%; height: 100px; border-radius: 4px; border: 1px solid #444; 
            padding: 8px; resize: vertical; font-family: monospace; font-size: 12px; 
            background: #1e1e1e; color: #fff; 
        }
        
        .btn-row { display: flex; gap: 6px; }
        .btn-row button { 
            flex: 1; padding: 10px; background: #0e639c; color: white; 
            border: none; cursor: pointer; border-radius: 4px; font-size: 13px;
        }
        .btn-row button:hover { background: #1177bb; }
        .btn-row button.green { background: #28a745; }
        .btn-row button.red { background: #dc3545; }
        .btn-row button.stop { background: #dc3545; }
        .btn-row button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        #status { font-size: 11px; color: #888; text-align: right; }

        #editor-area { flex: 1; display: flex; flex-direction: column; background: #2d2d2d; }
        #editor-toolbar {
            background: #333; padding: 8px 16px; border-bottom: 1px solid #444;
            display: flex; justify-content: space-between; align-items: center;
        }
        #editor-toolbar h2 { margin: 0; font-size: 14px; color: #ccc; }
        #slide-info { font-size: 12px; color: #888; }
        
        #preview-container { flex: 1; padding: 20px; overflow: auto; }
        #slide-stage { display: flex; justify-content: center; align-items: center; height: 100%; }
        
        #slide-frame {
            width: 100%; max-width: 900px; aspect-ratio: 16/9;
            background: white; border: none; border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <div id="sidebar-header">🎨 ZLIDES<span id="version-info">v0.1.0</span></div>
        <div id="history">
            <div class="msg agent">Ready! Describe your slide below.</div>
        </div>
        <div id="input-area">
            <!-- System Prompt -->
            <textarea id="system-prompt" placeholder="System prompt (optional) - e.g., 'You are a minimalist designer...'" 
                style="height: 50px;"></textarea>
            
            <div class="opts-row">
                <div>
                    <label>Pages</label>
                    <input type="number" id="page-count" min="1" max="20" value="1">
                </div>
                <div>
                    <label>Type</label>
                    <select id="slide-type">
                        <option value="slides">Slides</option>
                        <option value="poster">Poster</option>
                    </select>
                </div>
                <div>
                    <label>Layout</label>
                    <select id="slide-layout">
                        <option value="">Auto</option>
                        <option value="title-content">Title+Content</option>
                        <option value="two-column">Two Column</option>
                    </select>
                </div>
                <div>
                    <label>Theme</label>
                    <select id="slide-theme">
                        <option value="">Auto</option>
                        <option value="minimal">Minimal</option>
                        <option value="dark">Dark</option>
                    </select>
                </div>
            </div>
            <div class="btn-row">
                <button class="green" onclick="document.getElementById('file-input').click()">📎 Upload</button>
                <input type="file" id="file-input" style="display:none" onchange="uploadFile()">
            </div>
            
            <!-- User Prompt -->
            <textarea id="prompt" placeholder="What do you want on the slide? (e.g., 'A slide about photosynthesis')"></textarea>
            
            <div class="btn-row">
                <button id="gen-btn" onclick="sendCommand()">🎨 Generate</button>
                <button id="stop-btn" class="stop" onclick="stopRequest()" disabled>⏹ Stop</button>
                <button class="red" onclick="clearHistory()">🗑 Clear</button>
            </div>
            <div id="status">Ready</div>
        </div>
    </div>

    <div id="editor-area">
        <div id="editor-toolbar">
            <h2>Preview</h2>
            <span id="slide-info">No slides</span>
        </div>
        <div id="preview-container">
            <div id="slide-stage">
                <iframe id="slide-frame" sandbox="allow-scripts"></iframe>
            </div>
        </div>
    </div>

    <script>
        const historyDiv = document.getElementById('history');
        const promptBox = document.getElementById('prompt');
        const systemPromptBox = document.getElementById('system-prompt');
        const pageCountBox = document.getElementById('page-count');
        const slideTypeBox = document.getElementById('slide-type');
        const slideLayoutBox = document.getElementById('slide-layout');
        const slideThemeBox = document.getElementById('slide-theme');
        const statusDiv = document.getElementById('status');
        const slideFrame = document.getElementById('slide-frame');
        const slideInfo = document.getElementById('slide-info');
        const genBtn = document.getElementById('gen-btn');
        const stopBtn = document.getElementById('stop-btn');
        
        const backendURL = 'http://localhost:8766/command';
        const uploadURL = 'http://localhost:8766/upload';
        
        let currentSlides = [];
        let currentController = null;
        
        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.textContent = text;
            historyDiv.appendChild(div);
            historyDiv.scrollTop = historyDiv.scrollHeight;
        }

        async function sendCommand() {
            const text = promptBox.value.trim();
            const systemPrompt = systemPromptBox.value.trim();
            if (!text) {
                statusDiv.textContent = 'Enter a prompt first!';
                return;
            }
            
            // Disable generate, enable stop
            genBtn.disabled = true;
            stopBtn.disabled = false;
            
            addMessage(text, 'user');
            promptBox.value = '';
            statusDiv.textContent = 'Generating...';
            
            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'msg agent';
            thinkingDiv.textContent = '[Thinking...]';
            historyDiv.appendChild(thinkingDiv);
            historyDiv.scrollTop = historyDiv.scrollHeight;

            // Create abort controller for stopping
            currentController = new AbortController();

            try {
                const response = await fetch(backendURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: text,
                        system_prompt: systemPrompt,
                        page_count: parseInt(pageCountBox.value) || 1,
                        slide_type: slideTypeBox.value,
                        layout: slideLayoutBox.value,
                        theme: slideThemeBox.value
                    }),
                    signal: currentController.signal
                });

                if (!response.ok) throw new Error("Server error: " + response.status);
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();
                    
                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            const dataStr = line.substring(5).trim();
                            if (!dataStr || dataStr === '[DONE]') continue;
                            
                            try {
                                const data = JSON.parse(dataStr);
                                
                                if (data.type === 'final_html') {
                                    const html = data.html;
                                    slideFrame.srcdoc = html;
                                    currentSlides.push({ html, title: text });
                                    slideInfo.textContent = `Slide 1 of ${currentSlides.length}`;
                                    statusDiv.textContent = '✅ Done!';
                                    thinkingDiv.textContent = '[Complete]';
                                    
                                    // Re-enable buttons
                                    genBtn.disabled = false;
                                    stopBtn.disabled = true;
                                    currentController = null;
                                    return;
                                }
                                if (data.type === 'error') {
                                    thinkingDiv.textContent = 'Error: ' + data.text;
                                    statusDiv.textContent = 'Error';
                                }
                            } catch (e) {}
                        }
                    }
                }
                
                statusDiv.textContent = 'Done';
            } catch (err) {
                if (err.name === 'AbortError') {
                    statusDiv.textContent = '⏹ Stopped';
                    thinkingDiv.textContent = '[Stopped]';
                } else {
                    statusDiv.textContent = 'Error: ' + err.message;
                    thinkingDiv.textContent = 'Error: ' + err.message;
                    addMessage('Connection error - make sure server is running on port 8766', 'agent');
                }
            } finally {
                genBtn.disabled = false;
                stopBtn.disabled = true;
                currentController = null;
            }
        }

        function stopRequest() {
            if (currentController) {
                currentController.abort();
                statusDiv.textContent = '⏹ Stopping...';
            }
        }

        async function uploadFile() {
            const fileInput = document.getElementById('file-input');
            if (!fileInput.files.length) return;
            
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            
            statusDiv.textContent = 'Uploading...';
            try {
                const response = await fetch(uploadURL, { method: 'POST', body: formData });
                const data = await response.json();
                statusDiv.textContent = data.id ? 'Uploaded: ' + data.id : 'Done';
                addMessage('File uploaded', 'agent');
            } catch (e) {
                statusDiv.textContent = 'Upload failed';
            }
            fileInput.value = '';
        }

        function clearHistory() {
            if (confirm('Clear all?')) {
                currentSlides = [];
                slideFrame.srcdoc = '<html><body style="display:flex;align-items:center;justify-content:center;height:100vh;background:#f5f5f5;color:#999;"><h3>No slides</h3></body></html>';
                historyDiv.innerHTML = '<div class="msg agent">Cleared</div>';
                slideInfo.textContent = 'No slides';
                statusDiv.textContent = 'Ready';
            }
        }

        promptBox.addEventListener('keydown', e => {
            // Enter = send, Shift+Enter = new line
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendCommand();
            }
            // Shift+Enter does default (new line) - no handler needed
        });
        
        // Fetch version from backend
        fetch('http://localhost:8766/version')
            .then(r => r.json())
            .then(data => {
                if (data.version && data.git_commit) {
                    document.getElementById('version-info').textContent = 
                        `v${data.version} (${data.git_commit})`;
                }
            })
            .catch(() => {/* ignore */});
        
        // Init
        slideFrame.srcdoc = '<html><body style="display:flex;align-items:center;justify-content:center;height:100vh;background:#f5f5f5;color:#999;"><h3>Slide Preview</h3></body></html>';
    </script>
</body>
</html>
